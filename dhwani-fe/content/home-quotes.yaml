quotes:
  - name: Anuradha Rajaraman
    role: Senior Vocal Disciple
    quote: >
      Bharathi Aunty is a highly dedicated teacher who is deeply passionate about music.
      Despite her immense knowledge and experience, she remains humble, patient, and
      approachable. Her encouragement and commitment to her students make learning
      from her a truly enriching experience.

  - name: Aarathi Venugopal
    role: Senior Vocal Disciple
    quote: >
      After more than five years under Bharati ma'am's guidance, I have grown
      tremendously in many ways. I have had opportunities to perform at temples,
      stage shows, and many other events. She teaches not only Carnatic music but
      also film songs, and shows us the correct use of our voice.

  - name: Soundarya Ramarajan
    role: Senior Vocal Disciple
    quote: >
      What sets Bharati ma'am apart is the precision with which she identifies exactly what
      each student needs to work on — and under her guidance, I can genuinely see
      myself improving. She is so much more than a teacher: a friend, a mentor, and
      someone I deeply look up to.

  - name: Madhusudan & Charanya
    role: Parents of Praharshitha and Pravarthika 
    quote: >
      Bharati ma'am creates a fun, engaging classroom where our daughters love
      learning violin and Carnatic music. She gives each student thoughtful
      feedback and actively finds performance opportunities for them. We are
      blessed to have such a guru.


