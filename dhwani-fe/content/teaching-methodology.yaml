teachingMethodology:
  - title: Sample Lesson
    youtubeUrl: https://youtu.be/PpQM9xuw2Vo
    description: |
      A glimpse into a Dhwani Music Academy class — see how Bharati Murali teaches
      Carnatic vocal and violin with clarity, patience, and attention to each student.

  - title: "Never underestimate your students"
    youtubeUrl: https://youtu.be/nPMuY12HsQ8
    description: |
      This is one of my most valuable lessons from my mom & Guru. I always introduce gamakas when the students are at the geetham level after making sure that their swarasthanas are in place.
      Here, my student Jeyshriman (7 year old) learns a geetham from me and you can see the adeptness with which he picks up the gamakas.

  - title: Dhwani Classes — Teaching Praharshitha
    youtubeUrl: https://youtu.be/25Sg5GqoFr8
    description: |
      Praharshitha Madhusudhanan started learning the violin from scratch at Dhwani Music Academy. She has made tremendous progress after 3 years. 
      This is a snippet from our class, with me teaching her 'Ananda Natamaaduvaar' in the Ragam PurviKalyani.

  - title: Teaching Arun Poornachandran — Papanasam Sivan Competition
    youtubeUrl: https://youtube.com/shorts/J5MHO-UEZwI
    description: |
      Preparing Arun Poornachandran for the Papanasam Sivan Competition.

  - title: Translating Western Notes to Carnatic Swaras by Aparajith Venkataraman
    youtubeUrl: https://youtube.com/shorts/dDIj3lz2r84
    description: |
      Here is my super enthusiastic and talented student Aparajith, who translates
      western notes into Carnatic swaras.

  - title: Madhava Maaya — Hamsanandi
    youtubeUrl: https://youtu.be/90xxc7JM78k
    description: |
      Here is a video of my student Manasa Shivakumar learning from me, a rare Papanasam Sivan kriti 'Madhava Maaya' in the ragam Hamsanandi. Her face brightens up with a cheerful smile whenever any challenging phrase is thrown at her.

  - title: Gamakas workshop for SIOC
