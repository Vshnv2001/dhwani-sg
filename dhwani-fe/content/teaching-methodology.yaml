  - title: "Never underestimate your students"
    youtubeUrl: https://youtu.be/nPMuY12HsQ8
    description: |
      This is one of my most valuable lessons from my mom & Guru. I always introduce gamakas when the students are at the geetham level after making sure that their swarasthanas are in place.
      Here, my student Jeyshriman (7 year old) learns a geetham from me and you can see the adeptness with which he picks up the gamakas.

  - title: Madhava Maaya — Hamsanandi
    youtubeUrl: https://youtu.be/90xxc7JM78k
    description: |
      Here is a video of my student Manasa Shivakumar learning from me, a rare Papanasam Sivan kriti 'Madhava Maaya' in the ragam Hamsanandi. Her face brightens up with a cheerful smile whenever any challenging phrase is thrown at her.

