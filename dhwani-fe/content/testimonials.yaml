testimonials:
  - name: Aarathi Venugopal
    photo: /assets/aarathi_1.jpeg
    quote: |
      Bharati ma'am has been a great inspiration for me as a teacher. She teaches with so much patience and explains all the nuances clearly in the very first class itself.
      The best thing about her is that she never underestimates a student's potential to learn a difficult song. Rather, she is always confident in her teaching methods and believes that we will definitely reach there with practice and guidance. Any song that looks like a mountain becomes easy with her right teaching techniques.

      It has been more than 5 years under her guidance, and I have grown so much in many aspects. I have opportunities to perform in temples, stage shows, and many more events. Not only Carnatic music, she also trains students in film songs and teaches the correct use of our voice.
      
      I can see my self-growth through my ability to compose, write notations, understand raga bhavam, build swarams, and even teach others. Ragams that I never liked singing before have now become a beautiful part of my musical journey.

      Her workshops speak volumes about her experience and knowledge. She is also open to modern fusion ideas and never says no when we come up with something new.
      Every student's journey comes with emotions, and the very first emotion is always nervousness before every class. 😂😂 Even after so many years, I still practice many times before attending class, just to hear that one small but satisfying word, "Good," along with her little head nod. But yes, she knows it should not go to my head, so she keeps it very minimal! Haha.

      If you are thinking of joining her, please do so without any second thoughts.

  - name: Sravani Nagella
    photo: /assets/sravani_1.jpg
    quote: |
      When I started learning Carnatic Vocal at Dhwani Music Academy, I was very weak on my basics such as Taalam and Swarasthanam. I had nearly no knowledge of Carnatic theory and was unable to identify basic taalams and raagas. Bharati Ma'am is very patient with her teaching approach. She always gives her undivided attention to her students, making sure to dedicate herself to training each and every student even in group classes. She takes her time to meticulously teach me the nuances and identify even minute mistakes in my singing, and also makes sure that I understood my mistakes.

      When I was struggling to reach higher notes, she taught me many effective techniques to improve my voice range in a healthy and sustainable way. Simultaneously, Bharati Ma'am further piqued my interest in Carnatic Music as a subject more than a mere hobby, by explaining the inner workings of Carnatic theory, such as Melakarta-Janya raaga systems and how the systems evolved over time. I truly attribute my passion for the art form to her, for nurturing my talent and bestowing her endlessly vast knowledge upon me.

      Since I have joined Dhwani Music Academy, Bharati Ma'am has also instilled the confidence in me to perform on stage, as someone who once used to face crippling stage fear. I am also hence very thankful for the numerous opportunities to perform on stage and participate in Carnatic competitions in Singapore as it widened my exposure. I began to view Carnatic music as a performing art that is meant to be presented formally.

  - name: Madhusudan & Charanya
    role: Parents of Praharshitha and Pravarthika Madhusudhanan
    photos:
      - src: /assets/praharshita_vocal_subsenior_first.jpg
        alt: Praharshitha Madhusudhanan
      - src: /assets/Pravarthika.png
        alt: Pravarthika Madhusudhanan
    quote: |
      Bharathi teacher makes the class environment very fun filled and we enjoy learning violin and Carnatic music in the class with her. She is very devoted to teaching Carnatic music and violin to her students, provides specific feedback to each of her students. She proactively finds many forums for her students to perform. We are blessed to have such a guru for our daughters.

  - name: Radhika Ramachandran & Sahana Sthanunathan
    role: Mother of Sahana Sthanunathan · Adult & Junior Vocal Students
    photo: /assets/students/radhika_aunty.png
    quote: |
      Bharati thy name is perfection. The day my daughter joined Bharati Ma'am's class four years ago was a truly happy one for our family. Over the years I have seen her evolve, relearnt my own basics in new and experimental ways that made it challenging and fun while ensuring the notes get etched in our minds. In the process of practicing and recording videos and listening to Ma'am's recordings I discovered a love of Carnatic music that I did not know existed.

      Together with another like-minded parent, we convinced Ma'am to start our adults music class — a decision that has been one of the most rewarding experiences of my life. The music, the musical conversations and the camaraderie are something we eagerly look forward to every class.

      Ma'am constantly encourages us to step outside our comfort zones. She inspired us to participate in competitions such as the Papanasam Sivan and Purandara Dasa competitions, and the thrill of competing — and even winning — at our age was truly unforgettable.

      What makes Bharati Ma'am truly exceptional is her commitment to every student. On competition days, she is physically present for every student, cheering us on, motivating us, calming our nerves, and celebrating our successes. The exposure through various concerts, competitions and Bharati's trust in us has inspired confidence to perform publicly in all of us.

      At Dhwani we train hard and practice every day in the hopes of getting that elusive nod or "good" which feels as good as any award won. A teacher who very patiently works with us to overcome our limitations and occasionally treats us for our progress as well 😊. I would say come to Dhwani if you are looking for a place where we learn with passion and strive for perfection in every note.

  - name: Smitha Vanchinathan
    role: Parent & Adult Vocal Student
    photo: /assets/students/smitha_aunty.png
    quote: |
      I first came across Ms. Bharathi Murali through one of her Kitchen Katchery videos that was shared by a friend. Her presentation, knowledge, and passion for music instantly inspired me and sparked my curiosity to understand and identify songs through their ragas.

      Impressed by her teaching approach, I enrolled my daughters for Vocal and Violin classes. Seeing their progress and enthusiasm encouraged me to join her Vocal group classes as well.

      As a student, I often struggled with talam, pitch variations, and maintaining the correct high and low notes. However, Bharathi Ma'am's patience, encouragement, and systematic guidance have helped me gain confidence and improve steadily. She creates a positive and nurturing learning environment where every student feels supported, regardless of their skill level.

      We are truly fortunate to learn under such a dedicated and accomplished Guru. Her passion for teaching, deep musical expertise, and commitment to her students make every class an enriching experience.

      If you have a genuine desire to learn Carnatic music and are looking for a teacher who can nurture that passion with care and excellence, Ms. Bharathi Murali is undoubtedly the right Guru for your musical journey.

  - name: Shanthi
    role: Adult Vocal Student
    photo: /assets/students/shanthi_aunty.png
    quote: |
      Music was always a big part of my life — right from childhood through college. And then, like most of us, life took over and music quietly took a backseat. Picking it up again after so many years felt equal parts exciting and intimidating. Finding Bharati Ma'am and Dhwani honestly couldn't have come at a better time.

      What I didn't expect was how well Bharati Ma'am would just get it — the rustiness, the self-doubt, the "I used to be better at this" feeling. She works with you where you are, not where she wishes you were. Patient, sharp, and genuinely invested in every student's progress.

      One thing that never stops surprising me — she'll instantly connect what we're learning to more ragas and swaras on the spot, effortlessly weaving in the depth and breadth of her knowledge mid-class. And then she'll have us repeat it over and over, very patiently, until every swara sthana sits exactly where it should. No rushing, no frustration — just that quiet persistence until you get it right.

      And then there's the Dhwani vibe itself — the music, the conversations about music, the laughs, the banter — it's something we all look forward to every class. It doesn't feel like just a music class; it feels like your people.

      Bharati Ma'am also makes sure we perform — concerts, competitions, the works. She's right there with you on those days, cheering you on and somehow managing to calm your nerves at the same time. That kind of push has brought back a performance confidence I didn't even know I'd lost.

      The standard at Dhwani is high, and honestly that's what keeps it exciting. That one "good" from Bharati Ma'am after a hard week of practice? Better than any trophy.

      We are truly fortunate to learn under such a dedicated and accomplished Guru. Her passion for teaching, deep musical expertise, and commitment to her students make every class a genuinely enriching experience. If you're thinking about getting back into music — or starting fresh — just come to Dhwani. You'll know what I mean after the first class.

  - name: Sowmyaa Pandurangan
    role: Parent & Adult Vocal Student
    photo: /assets/students/sowmya_aunty.png
    quote: |
      I came across Bharathi Murali mam during a competition where she was the judge. Initially my son joined as her student and I was really happy with her teaching and she introduced him to various competitions.

      After a sudden spark, myself and another friend decided to join her for classes. Though initially difficult, we gradually began to understand the subtle nuances taught by her. She will come up with rare and beautiful kritis and technically she is very strong.

      I really appreciate her patience while teaching. Even though it's a group class you can't do "Gumbaloda Govinda" because she will not let us until we get our lines correct. Her recordings of the songs taught were really helpful for us to practice.

      She encouraged us to participate in competitions and temple performances which really boosted our confidence level and really made us feel happy and also she will ensure her physical presence to cheer us for the performances.

      I can clearly see how much I have improved in my music and the credit goes to our teacher Bharathi Murali. We are really fortunate and blessed to have her as our Guru..thank you mam 🙏🏻
  
  - name: Anuradha Rajaraman
    role: Senior Vocal Disciple
    photo: /assets/students/anu.png
    quote: |
      Bharathi Aunty is a highly dedicated teacher who is deeply passionate about music. Despite her immense knowledge and experience, she remains humble, patient, and approachable. Her encouragement and commitment to her students make learning from her a truly enriching experience.

  - name: Sundari
    role: Parent & Adult Vocal Student
    photo: /assets/students/sundari_aunty.png
    quote: |
      My dream of learning Carnatic music again came true 2 years ago when I started classes with Ms. Bharathi Murali in Dhwani Academy. She is the person who laid a strong foundation in music for my daughter many years ago while she was in Primary school.

      I was apprehensive and excited at the same time. I was much older than the others in the adult group. My worries were put to rest by the Guru's teaching style and dedication. Her classes are lively and engaging. She shares generously on the theoretical aspects of Carnatic music during her lessons.

      Ms. Bharathi's love for her students and belief in their ability is beyond compare. This trait in the guru is something that inspires me to attend every class. She is the epitome of a devoted teacher. She teaches sangathis again and again till we get it right.

      She also makes it a point to expose us to performances and competitions. We have attended a number of temple performances and participated in competitions too. This aspect is important as it allows students to overcome stage fear, showcase their learning and sing to accompanying instruments.

      Our guru is an excellent teacher, a talented musician and a wealth of musical knowledge. We are privileged to be her students.

