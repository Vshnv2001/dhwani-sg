testimonials:
  - name: Aarathi Venugopal
    photo: /assets/aarathi_1.jpeg
    quote: |
      Bharati ma'am has been a great inspiration for me as a teacher. She teaches with so much patience and explains all the nuances clearly in the very first class itself.
      The best thing about her is that she never underestimates a student's potential to learn a difficult song. Rather, she is always confident in her teaching methods and believes that we will definitely reach there with practice and guidance. Any song that looks like a mountain becomes easy with her right teaching techniques.
      It has been more than 5 years under her guidance, and I have grown so much in many aspects. I have opportunities to perform in temples, stage shows, and many more events. Not only Carnatic music, she also trains students in film songs and teaches the correct use of our voice.
      I can see my self-growth through my ability to compose, write notations, understand raga bhavam, build swarams, and even teach others. Ragams that I never liked singing before have now become a beautiful part of my musical journey.
      Her workshops speak volumes about her experience and knowledge. She is also open to modern fusion ideas and never says no when we come up with something new.
      Every student's journey comes with emotions, and the very first emotion is always nervousness before every class. 😂😂 Even after so many years, I still practice many times before attending class, just to hear that one small but satisfying word, "Good," along with her little head nod. But yes, she knows it should not go to my head, so she keeps it very minimal! Haha.
      If you are thinking of joining her, please do so without any second thoughts.
      
  - name: Soundarya Ramarajan
    role: Senior Vocal Disciple
    photo: /assets/soundarya_1.jpeg
    quote: >
      Learning under Bharathi Murali ma'am has been a truly enriching experience.
      What sets her apart is the precision with which she identifies exactly what
      each student needs to work on — and under her guidance, I can genuinely see
      myself improving. She is so much more than a teacher: a friend, a mentor, and
      someone I deeply look up to, who consistently goes out of her way for her
      students. I consider myself fortunate to be learning from her.

  - name: Madhusudan & Charanya
    role: Parents of Praharshitha and Pravarthika Madhusudhanan
    photos:
      - src: /assets/praharshita_vocal_subsenior_first.jpg
        alt: Praharshitha Madhusudhanan
      - src: /assets/Pravarthika.png
        alt: Pravarthika Madhusudhanan
    quote: |
      Bharathi teacher makes the class environment very fun filled and we enjoy learning violin and Carnatic music in the class with her. She is very devoted to teaching Carnatic music and violin to her students, provides specific feedback to each of her students. She proactively finds many forums for her students to perform. We are blessed to have such a guru for our daughters.

  - name: Sravani
    role: Vocal Disciple
    photo: /assets/sravani_1.jpg
    quote: |
      When I started learning Carnatic Vocal at Dhwani Music Academy, I was very weak on my basics such as Taalam and Swarasthanam. I had nearly no knowledge of Carnatic theory and was unable to identify basic taalams and raagas. Bharati Ma'am is very patient with her teaching approach. She always gives her undivided attention to her students, making sure to dedicate herself to training each and every student even in group classes. She takes her time to meticulously teach me the nuances and identify even minute mistakes in my singing, and also makes sure that I understood my mistakes.

      When I was struggling to reach higher notes, she taught me many effective techniques to improve my voice range in a healthy and sustainable way. Simultaneously, Bharati Ma'am further piqued my interest in Carnatic Music as a subject more than a mere hobby, by explaining the inner workings of Carnatic theory, such as Melakarta-Janya raaga systems and how the systems evolved over time. I truly attribute my passion for the art form to her, for nurturing my talent and bestowing her endlessly vast knowledge upon me.

      Since I have joined Dhwani Music Academy, Bharati Ma'am has also instilled the confidence in me to perform on stage, as someone who once used to face crippling stage fear. I am also hence very thankful for the numerous opportunities to perform on stage and participate in Carnatic competitions in Singapore as it widened my exposure. I began to view Carnatic music as a performing art that is meant to be presented formally.
