sections:
  - title: Early Music Career
    paragraphs:
      - >
        Bharati started her initial training in Carnatic Vocal music, in India,
        under her mother Mrs. Saroja Sampath, disciple of Sangeetha Kalanidhi
        Dr. S. Ramanathan, and Carnatic Violin under Lalgudi Smt. S. Alamelu.
      - >
        She has won many prestigious music competitions, notably first prize in
        Tamil Nadu State level competitions conducted by the Government of
        India's Nehru Yuva Kendra in 1995, a Gold in Kanchi Kamakoti's Jan
        Kalyan competition, and first prize for the violin open category in the
        National Level Indian Music competition (2000) held by the National Arts
        Council, Singapore.
      - >
        After moving to Singapore in 1997, she came under the tutelage of
        renowned musicians in SIFAS (Singapore Indian Fine Arts Society) for
        both violin and vocal. She is currently under the guidance of Sri Veena
        R. Parthasarathi for Carnatic vocal and Mr. Radha Vijayan for Western
        Keyboard. She has also trained under Guru Debasish Adhikary ji of SIFAS
        for Ghazal singing.

  - title: As a Performer
    paragraphs:
      - >
        Bharati has been performing full-fledged concerts regularly during
        SIFAS festivals, chamber and temple concerts, Ragam Tanam Pallavi
        concerts, and also in many prestigious venues like the Esplanade,
        Singapore. She was part of the SIFAS Hindustani Orchestra as a violinist
        and hence was able to adapt to different styles of classical music.
      - >
        She has also rendered Carnatic–Hindustani Jugalbandi concerts on violin,
        which were very well appreciated.

  - title: As a Composer
    paragraphs:
      - >
        Bharati has a keen interest in composing and has set tunes for a few
        Thirukkural verses which her students performed and won prizes. She has
        also composed many complex pallavis, kritis, and thillanas.

  - title: As a Teacher
    paragraphs:
      - >
        Bharati is the founder of Dhwani Music Academy and is a sought-after
        teacher, known to lay a very strong foundation in the basics of Carnatic
        Music — both practical and theory — and also raga identification
        techniques. She is also teaching vocal music at the Music and Dance
        Academy of Sri Shenpaga Vinayagar Temple, Ceylon Road, Singapore.
      - >
        She has trained the choir group of Singapore Indian Orchestra and Choir
        (SIOC) for their two major shows:
    list:
      - >
        Atma Gaanam at Esplanade Concert Hall, 2022 — in which she trained them
        to sing Ragam Tanam Pallavi in a complicated raga and tala, Chalanatta
        Raga and Chalanatta Tala, and also a few songs.
      - >
        Bollywood Musical Show at Esplanade Theatre, performed by Chak de India
        fame Bollywood music directors Salim and Sulaiman, 2023.
    paragraphsAfterList:
      - >
        She has also conducted Carnatic Music quizzes at national and
        international levels for SYAMA and SOORYA Singapore respectively, and
        lecture demonstrations on topics like Grahabedam, shruthi, and more for
        private groups of music enthusiasts. She has been invited as a judge in
        various prestigious competitions such as Purandaradasa competitions, Arts
        Hub, Kannadasan competitions, and others.

  - title: YouTube Channel
    paragraphs:
      - >
        Being an ardent lover of music, she runs her own YouTube channel called
        Kitchen Kutcheri, wherein apart from cooking, she focuses on different
        aspects of Carnatic ragas, their equivalent Hindustani ragas, and their
        use in film songs. Her aim is to pass on our rich musical tradition to
        the next generation, help them develop deep interest in music, and
        become great musicians in the future.
