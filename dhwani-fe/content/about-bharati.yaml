titleLine: Founder & Principal Guru, Dhwani Music Academy
intro: >
  Bharati Murali is an accomplished Carnatic vocalist, violinist, composer,
  educator, and music mentor with over 25 years of teaching experience. Deeply
  rooted in the rich traditions of Indian classical music, she has dedicated her
  life to learning, performing, composing, and nurturing the next generation of
  musicians.

sections:
  - title: Early Music Career
    paragraphs:
      - >
        Her musical journey began at a young age in India under the guidance of
        her mother, Mrs. Saroja Sampath, a disciple of the renowned Sangeetha
        Kalanidhi Dr. S. Ramanathan. Simultaneously, she received intensive
        training in Carnatic violin from Lalgudi Smt. S. Alamelu.
      - >
        During her formative years, Bharati distinguished herself in numerous
        prestigious music competitions, including securing First Prize in the
        Tamil Nadu State-Level Competition conducted by the Government of India's
        Nehru Yuva Kendra and winning a Gold Medal in the Kanchi Kamakoti Jan
        Kalyan Competition. 
      - >
        To deepen her understanding of rhythm and laya, she also underwent four
        years of training in Mridangam under Madurai Sri S. Ananthakrishnan.
      - >
        After relocating to Singapore in 1997, Bharati continued her advanced
        musical training under several eminent gurus at the Singapore Indian Fine
        Arts Society (SIFAS). Her musical excellence was recognized nationally
        when she was awarded First Prize in the Open Violin Category at the
        National Level Indian Music Competition organized by the National Arts
        Council, Singapore, in 2000. Her mentors included Sri A.K. Karunakaran, Sri
        N.R. Prashanth, Sri K. Sivaraman, Dr. Seshulatha, and Ms. M.S. Vidya.
        She further honed her violin artistry under Shertalai Sri Shivakumar,
        specializing in advanced techniques that emulate the nuances of vocal
        music on the violin. She also trained in Ghazal singing under Guru
        Debasish Adhikary and continues to pursue musical excellence under the
        guidance of Sri Veena R. Parthasarathi for Carnatic vocal music and Mr.
        Radha Vijayan for Western Keyboard.

  - title: As a Performer
    paragraphs:
      - >
        Over the years, Bharati has established herself as a highly respected
        performer, presenting full-length Carnatic concerts, Ragam-Tanam-Pallavi
        concerts, chamber recitals, and temple performances. She has performed at
        prestigious venues, including Singapore's Esplanade, and has been a
        regular participant in numerous SIFAS festivals.
      - >
        As a former violinist with the SIFAS Hindustani Orchestra, she developed
        remarkable versatility across different classical traditions and received
        widespread appreciation for her Carnatic-Hindustani Jugalbandi violin
        performances.

  - title: As a Composer
    paragraphs:
      - >
        A passionate composer, Bharati has created original pallavis, kritis,
        and thillanas, and has also composed melodies for selected Thirukkural
        verses. Several of these compositions have been performed by her students,
        earning recognition and awards in various competitions.
      - >
        For the 40th anniversary mega-event of SIOC (Singapore Indian Orchestra and Choir), Nada Yatra (2025), she conceptualized and composed a unique
        Ragam-Tanam-Pallavi in Lalitha Raga and Lalitha Tala, featuring
        Ragamalika Tanams in four ragas — two from the Carnatic tradition and two
        from the Hindustani tradition — all having the name "Lalitha" in common, which she
        also trained the entire SIOC team of 50 to present.

  - title: As a Teacher
    paragraphs:
      - >
        Bharati is the Founder of Dhwani Music Academy, teaching Carnatic vocal
        and violin to students in Singapore and across the globe. Her students
        have won top honors in competitions, performed at prestigious venues,
        and appeared on television reality shows.
    subsections:
      - heading: What she trains students for
        list:
          - Carnatic vocal and violin — beginner to advanced levels
          - Strong foundation in practical and theoretical aspects of music
          - Raga identification from the earliest stages of training
          - Competition, concert, and performance preparation
          - All India Radio (AIR) Gradation and Indian music exams
      - heading: Teaching Experience
        list:
          - Dhwani Music Academy (Founder) — Singapore and online
          - Sri Senpaga Vinayagar Temple Music and Dance Academy — Carnatic vocal faculty (2022-2024)
          - "Singapore Indian Orchestra and Choir (SIOC) — Atma Gaanam, Esplanade Concert Hall (2022): trained the choir to present a challenging Ragam-Tanam-Pallavi in Chalanatta Raga and Tala, along with other musical pieces"
          - "Singapore Indian Orchestra and Choir (SIOC) — Bollywood Musical Show, Esplanade Theatre (2023): conducted and trained the choir for a production featuring Bollywood music directors Salim and Sulaiman"
          - "Singapore Indian Orchestra and Choir (SIOC) — Spring Harmony, Victoria Theatre (2025): trained the choir in the presentation of a Ragam-Tanam-Pallavi as part of the concert repertoire"
      - heading: Lec-Dems, Workshops and Quizzes
        list:
          - Conducted quiz for SOORYA Singapore
          - Workshop for SIOC on Gamakas (full house audience)
      - heading: Invited to judge
        list:
          - Purandaradasa Competitions (2024)
          - Arts Hub Competitions (2025)
          - Kannadasan Competitions (2026)

  - title: YouTube Channel
    link:
      label: Kitchen Kutcheri
      url: https://www.youtube.com/@kitchenkutcheri874
    paragraphs:
      - >
        An ardent advocate of music education, Bharati also runs her YouTube
        channel, Kitchen Kutcheri, where she combines her love for cooking with
        engaging discussions on Carnatic ragas, their Hindustani counterparts,
        raga identification techniques, and the influence of classical ragas in
        film music.
      - >
        Her vision is both simple and profound: to preserve and pass on the rich
        heritage of Indian classical music, inspire a deep appreciation for the
        art form, and empower students to become confident musicians and
        lifelong ambassadors of our musical tradition.
